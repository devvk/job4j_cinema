<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<main class="container">
    <div class="row mt-3 mb-3 text-center">
        <div class="col">
            <h1>Фильмы</h1>
        </div>
    </div>
    <div class="row">
        <table class="table">
            <thead>
            <tr>
                <th scope="col">Постeр</th>
                <th scope="col">Название</th>
                <th scope="col">Описание</th>
                <th scope="col">Жанр</th>
                <th scope="col">Год</th>
                <th scope="col">Возраст</th>
                <th scope="col">Длительность</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="film: ${films}">
                <td><img th:src="@{'/' + ${film.filePath}}" width="100" alt="Постер"></td>
                <td><b th:text="${film.name}"></b></td>
                <td th:text="${film.description}"></td>
                <td th:text="${film.genreName}"></td>
                <td th:text="${film.year}"></td>
                <td th:text="${film.minimalAge}"></td>
                <td th:text="${film.durationInMinutes}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
