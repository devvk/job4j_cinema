<html xmlns:th="http://www.thymeleaf.org" lang="en">
<nav th:fragment="navigation" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Cinema</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav me-auto">
                <a class="nav-item nav-link active" th:href="@{/films}">Фильмы</a>
                <a class="nav-item nav-link active" th:href="@{/sessions}">Расписание</a>
            </div>
            <div class="d-flex" th:if="${session.user == null}">
                <a class="nav-link text-secondary" th:href="@{/users/register}">Регистрация</a>
                <a class="nav-link text-secondary" th:href="@{/users/login}">Вход</a>
            </div>
            <div class="d-flex" th:if="${session.user != null}">
                <a class="nav-link text-secondary me-3" href="#" th:text="${session.user.fullName}"></a>
                <a class="nav-link text-secondary" th:href="@{/users/logout}">Выйти</a>
            </div>
        </div>
    </div>
</nav>
</html>
